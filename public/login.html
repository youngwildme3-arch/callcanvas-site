<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Log in - CallCanvas AI</title>
<meta name="description" content="Log in to CallCanvas AI with your email.">
<meta name="robots" content="noindex">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:#080b10;color:#f0f6fc;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:440px;width:100%;background:#131b27;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:40px 36px}
.logo{color:#0ea5e9;font-weight:900;font-size:18px;text-align:center;margin-bottom:24px;text-decoration:none;display:block;letter-spacing:.04em}
h1{font-size:26px;font-weight:900;margin-bottom:8px;letter-spacing:-.01em}
.sub{color:rgba(240,246,252,.65);font-size:14px;line-height:1.5;margin-bottom:24px}
label{display:block;font-size:12px;font-weight:700;color:rgba(240,246,252,.55);letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase}
input{width:100%;padding:12px 14px;background:#0b1220;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#f0f6fc;font-size:15px;font-family:inherit}
input:focus{outline:0;border-color:#0ea5e9}
.btn{display:block;width:100%;margin-top:18px;padding:13px;background:#0ea5e9;color:#000;border:0;border-radius:10px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit}
.btn:hover:not(:disabled){background:#0284c7}
.btn:disabled{opacity:.5;cursor:wait}
.msg{margin-top:14px;padding:12px;border-radius:10px;font-size:13px;display:none}
.msg.show{display:block}
.msg.error{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.msg.success{background:rgba(34,197,94,.1);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.alt{text-align:center;margin-top:20px;font-size:13px;color:rgba(240,246,252,.45)}
.alt a{color:#0ea5e9;text-decoration:none}
.alt a:hover{text-decoration:underline}
</style>
<link rel="canonical" href="https://callcanvasai.com/login.html">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230ea5e9'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='%23000' font-family='Arial,sans-serif' font-weight='900' font-size='34'%3EC%3C/text%3E%3C/svg%3E">
<meta name="theme-color" content="#0ea5e9">
<meta property="og:type" content="website">
<meta property="og:url" content="https://callcanvasai.com/login.html">
<meta property="og:title" content="Log in - CallCanvas AI">
<meta property="og:description" content="Log in to your CallCanvas AI subscription. Enter your email to access your call sheet.">
<meta property="og:image" content="https://callcanvasai.com/og-image.png">
<meta name="twitter:card" content="summary_large_image">
</head><body>
<div class="card">
  <a href="/" class="logo">CALLCANVAS AI</a>
  <h1>Log in</h1>
  <p class="sub">Enter the email you used to sign up. No password &mdash; we just check your subscription is active.</p>

  <label for="email">Your email</label>
  <input type="email" id="email" placeholder="you@company.com" autocomplete="email" autofocus />

  <button class="btn" id="login-btn">Continue &rarr;</button>

  <div class="msg" id="msg"></div>

  <p class="alt">No account yet? <a href="/research.html">Start a 7-day free trial &rarr;</a></p>
</div>

<script>
(function() {
  const emailInput = document.getElementById('email');
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('msg');

  // Pre-fill from localStorage if present
  try {
    const saved = localStorage.getItem('callcanvas_email');
    if (saved) emailInput.value = saved;
  } catch (e) {}

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg show ' + type;
  }
  function hideMsg() { msg.className = 'msg'; }

  async function login() {
    const email = (emailInput.value || '').trim().toLowerCase();
    if (!email || !email.includes('@')) {
      showMsg('Please enter a valid email address.', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Checking...';
    hideMsg();

    try {
      const r = await fetch('/.netlify/functions/check-access', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await r.json();

      if (data.hasAccess) {
        try { localStorage.setItem('callcanvas_email', email); } catch (e) {}
        showMsg('Logged in. Redirecting...', 'success');
        setTimeout(function(){ location.href = '/research.html'; }, 600);
      } else {
        const reason = data.reason || 'unknown';
        if (reason === 'no_record') {
          showMsg("We don't have a subscription on file for that email. Want to start a free trial instead?", 'error');
        } else if (reason === 'canceled') {
          showMsg('Your subscription was canceled. Click below to start a new one.', 'error');
        } else if (reason === 'past_due') {
          showMsg('Your subscription is past due. Please update your payment method.', 'error');
        } else {
          showMsg('Subscription not active. Reason: ' + reason, 'error');
        }
        btn.disabled = false;
        btn.textContent = 'Try a different email';
      }
    } catch (e) {
      showMsg('Network error. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Continue â';
    }
  }

  btn.addEventListener('click', login);
  emailInput.addEventListener('keydown', function(ev) {
    if (ev.key === 'Enter') login();
  });
})();
</script>
</body></html>
